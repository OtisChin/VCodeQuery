<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT 登陆验证码查询</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="main-shell">
        <section class="hero">
          <div class="hero-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="hero-icon-svg">
              <rect x="0" y="0" width="64" height="64" rx="16" fill="#10B981" />
              <path d="M32 15l11 4v8c0 10.3-5.9 16.9-11 20-5.1-3.1-11-9.7-11-20v-8l11-4z" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" />
              <path d="M27 31.5l4 4 7-8" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <h1>ChatGPT 验证码查询</h1>
          <p class="hero-subtitle">输入您的注册邮箱，快速获取最新的验证码</p>
        </section>

        <section class="query-shell">
          <form id="query-form" class="query-form">
            <div class="query-card">
              <div class="query-input-wrap">
                <div class="email-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M4 6.5h16a1.5 1.5 0 0 1 1.5 1.5v8A1.5 1.5 0 0 1 20 17.5H4A1.5 1.5 0 0 1 2.5 16V8A1.5 1.5 0 0 1 4 6.5zm0 1.5v.2l8 5.6 8-5.6V8H4zm16 8v-6l-7.57 5.3a.75.75 0 0 1-.86 0L4 10v6h16z" fill="currentColor" />
                  </svg>
                </div>
                <input
                  id="email"
                  name="email"
                  type="email"
                  inputmode="email"
                  autocomplete="off"
                  placeholder="example@gmail.com"
                  required
                />
              </div>
              <button id="submit-button" type="submit" class="query-button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10.5 4.5a6 6 0 1 1 0 12 6 6 0 0 1 0-12zm0 1.8a4.2 4.2 0 1 0 0 8.4 4.2 4.2 0 0 0 0-8.4zm7.23 9.96 3.27 3.27a.9.9 0 0 1-1.27 1.27l-3.27-3.27a.9.9 0 0 1 1.27-1.27z" fill="currentColor" />
                </svg>
                <span>立即查询</span>
              </button>
            </div>
          </form>

          <div id="status" class="status-line" aria-live="polite"></div>

          <section id="result" class="result-card is-hidden">
            <div class="result-code-row">
              <span class="result-label">验证码</span>
              <strong id="result-code">------</strong>
            </div>

            <div class="result-meta-grid">
              <div class="meta-item">
                <span>接收时间</span>
                <strong id="result-time">-</strong>
              </div>
              <div class="meta-item">
                <span>邮件主题</span>
                <strong id="result-subject">-</strong>
              </div>
              <div class="meta-item">
                <span>发件人</span>
                <strong id="result-from">-</strong>
              </div>
            </div>
          </section>

          <div id="helper-copy" class="helper-copy">
            <span id="helper-copy-default">
              没有收到验证码？请点击登录页上
              <a href="/" class="helper-link">重新发送电子邮件</a>
            </span>
            <span id="helper-copy-success" class="is-hidden-inline">
              验证码不正确? 请检查验证码接收时间。由于 ChatGPT 服务器在国外，接码可能不及时，请等待 2-3 分钟再次查询。
            </span>
          </div>

          <div class="helper-links">
            <a href="/" class="helper-item">使用教程</a>
            <a href="/" class="helper-item">常见问题</a>
            <a href="/" class="helper-item">联系支持</a>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
